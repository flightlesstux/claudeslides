name: PR Content Moderation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "author/**"

permissions:
  pull-requests: write
  contents: read

jobs:
  moderate:
    name: Content Safety Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Find changed author files
        id: changed
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'author/**/*.html' | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Changed HTML files: $FILES"

      - name: Run content moderation
        id: moderate
        run: |
          FAILED=0
          REPORT=""
          for FILE in ${{ steps.changed.outputs.files }}; do
            echo "Checking: $FILE"
            OUTPUT=$(python .github/scripts/moderate_content.py "$FILE" 2>&1)
            CODE=$?
            REPORT="${REPORT}\n### \`$FILE\`\n${OUTPUT}\n"
            if [ $CODE -ne 0 ]; then
              FAILED=1
            fi
          done
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          # Save report for comment step (multiline safe)
          printf "%b" "$REPORT" > /tmp/moderation_report.txt

      - name: Validate folder structure
        id: structure
        run: |
          FAILED=0
          for FILE in ${{ steps.changed.outputs.files }}; do
            # Must be author/{slug}/index.html
            if ! echo "$FILE" | grep -qE '^author/[a-z0-9][a-z0-9-]*/index\.html$'; then
              echo "❌ Invalid path: $FILE (must be author/{slug}/index.html with lowercase slug)"
              FAILED=1
            fi
          done
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/moderation_report.txt', 'utf8');
            const contentFailed = '${{ steps.moderate.outputs.failed }}' === '1';
            const structFailed = '${{ steps.structure.outputs.failed }}' === '1';
            const allPassed = !contentFailed && !structFailed;

            const header = allPassed
              ? '## ✅ Automated checks passed\n\nYour submission is ready for maintainer review!'
              : '## ❌ Automated checks failed\n\nPlease fix the issues below and push again.';

            const structNote = structFailed
              ? '\n### ⚠️ Folder structure issue\nFiles must follow the pattern `author/{slug}/index.html` where `{slug}` is lowercase letters, numbers, and hyphens only.\n'
              : '';

            const body = `${header}${structNote}\n---\n### Content moderation report\n${report}\n---\n*Automated check by [claudeslides](https://claudeslides.com). Questions? Open a Discussion.*`;

            // Delete previous bot comments to keep the PR clean
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments.data) {
              if (c.user.login === 'github-actions[bot]' && c.body.includes('Automated checks')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if checks failed
        if: steps.moderate.outputs.failed == '1' || steps.structure.outputs.failed == '1'
        run: |
          echo "Content moderation or structure check failed."
          exit 1
