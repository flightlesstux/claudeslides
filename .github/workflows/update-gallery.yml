name: Update Gallery

on:
  push:
    branches: [main]
    paths:
      - "author/**"

permissions:
  contents: write

jobs:
  regenerate:
    name: Regenerate submissions.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git log dates in script

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install Pillow
          sudo apt-get install -y fonts-liberation

      - name: Generate covers
        run: python .github/scripts/generate_covers.py

      - name: Generate submissions.json
        run: python .github/scripts/generate_submissions.py

      - name: Generate sitemap.xml
        run: python .github/scripts/generate_sitemap.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add submissions.json covers/ sitemap.xml
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: regenerate submissions, covers, and sitemap [skip ci]"
            git push
          fi
