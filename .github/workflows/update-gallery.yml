name: Update Gallery

on:
  push:
    branches: [main]
    paths:
      - "author/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    name: Regenerate submissions.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git log dates in script
          token: ${{ secrets.GALLERY_BOT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install Pillow
          sudo apt-get install -y fonts-liberation

      - name: Generate covers
        run: python .github/scripts/generate_covers.py

      - name: Inject missing SEO tags
        run: python .github/scripts/inject_seo.py

      - name: Generate submissions.json
        run: python .github/scripts/generate_submissions.py

      - name: Generate sitemap.xml
        run: python .github/scripts/generate_sitemap.py

      - name: Commit if changed
        env:
          TOKEN: ${{ secrets.GALLERY_BOT_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/flightlesstux/claudeslides.git
          git add submissions.json author/ sitemap.xml
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: regenerate submissions, covers, and sitemap [skip ci]"
            git push origin main
          fi
